version: "3.9"

services:
  # Nginx反向代理服务
  nginx:
    container_name: aigc_nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./admin:/usr/share/nginx/html/admin:ro
      - ./templates:/usr/share/nginx/html/templates:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    restart: unless-stopped
    networks:
      - aigc_network
    depends_on:
      - backend

  # 后端API服务
  backend:
    container_name: aigc_backend
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      - ./logs/backend:/app/logs
      - ./uploads:/app/uploads
      - ./templates:/app/templates
    restart: unless-stopped
    networks:
      - aigc_network
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB数据库服务
  mongo:
    container_name: aigc_mongo
    image: mongo:6.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASS}
      MONGO_INITDB_DATABASE: aigc
    volumes:
      - mongo_data:/data/db
      - ./config/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./logs/mongo:/var/log/mongodb
    restart: unless-stopped
    networks:
      - aigc_network
    command: ["mongod", "--auth", "--logpath", "/var/log/mongodb/mongod.log"]

  # Redis缓存服务（可选）
  redis:
    container_name: aigc_redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/etc/redis/redis.conf:ro
    restart: unless-stopped
    networks:
      - aigc_network
    command: ["redis-server", "/etc/redis/redis.conf"]

  # 模板管理服务
  template_manager:
    container_name: aigc_template_manager
    build:
      context: ./template-manager
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      - ./templates:/app/templates
      - ./admin:/app/admin
      - ./logs/template-manager:/app/logs
    restart: unless-stopped
    networks:
      - aigc_network
    depends_on:
      - mongo

# 网络配置
networks:
  aigc_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 数据卷配置
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local